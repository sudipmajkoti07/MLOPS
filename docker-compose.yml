version: '3.8'

x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.9.2-python3.11}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:- pandas pymysql sqlalchemy cryptography redis mlflow==2.16.0 scikit-learn evidently==0.4.31}
    MLFLOW_TRACKING_URI: http://mlflow:5000
    GIT_PYTHON_REFRESH: quiet
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./:/opt/airflow/data
    - mlflow-data-volume:/mlflow
  depends_on:
    - postgres
    - mariadb
    - redis
    - mlflow

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - 8080:8080
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      - postgres
      - mariadb
      - redis
      - mlflow
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      - postgres
      - mariadb
      - redis
      - mlflow
      - airflow-init

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    depends_on:
      - postgres

  mariadb:
    build:
      context: .
      dockerfile: Dockerfile.mariadb
    privileged: true
    shm_size: "512m"
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: mlops
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data-volume:/var/lib/mysql
      - columnstore-data-volume:/var/lib/columnstore
      - ./mariadb_init:/docker-entrypoint-initdb.d
      - ./mariadb_conf/99-docker.cnf:/etc/mysql/mariadb.conf.d/99-docker.cnf:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data-volume:/data
    command: redis-server --appendonly yes
    restart: always

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data-volume:/mlflow
    entrypoint: >
      bash -c "mkdir -p /mlflow/artifacts && chmod -R 777 /mlflow/artifacts &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --serve-artifacts"
    restart: always

  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REGISTERED_MODEL_NAME: loan_logistic_regression
    volumes:
      - mlflow-data-volume:/mlflow
    depends_on:
      - mlflow
    restart: always

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: always

  jupyter:
    image: jupyter/scipy-notebook:latest
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: "mlops"
      JUPYTER_ENABLE_LAB: "yes"
    volumes:
      - ./notebooks:/home/jovyan/work
    depends_on:
      - mariadb
    restart: always

volumes:
  postgres-db-volume:
  mariadb-data-volume:
  columnstore-data-volume:
  redis-data-volume:
  mlflow-data-volume:
